when:
  - event: [cron, manual, push, pull_request]

# A throwaway Audiobookshelf server, shared on the workflow network and
# reachable by the service name. It is initialized and torn down per run,
# so no persistent volumes are needed.
services:
  - name: audiobookshelf
    # TODO: pin to a specific released tag once verified against CI;
    # see the tags at ghcr.io/advplyr/audiobookshelf.
    image: ghcr.io/advplyr/audiobookshelf:latest
    # Woodpecker sets every container's working directory to the cloned
    # repo workspace. Audiobookshelf's image starts with a *relative*
    # `node index.js`, so the changed workdir makes Node look for the entry
    # script in the workspace and fail with MODULE_NOT_FOUND. Start it
    # explicitly from its own app directory instead.
    entrypoint: ["/bin/sh", "-c", "cd /app && node index.js"]
    environment:
      PORT: "13378"

steps:
  - name: vet
    image: golang:1.26
    environment:
      CGO_ENABLED: "0"
    commands:
      - go vet ./...

  - name: test
    image: golang:1.26
    environment:
      CGO_ENABLED: "0"
    commands:
      - go test -count=1 ./...

  - name: lint
    image: golangci/golangci-lint:v2.12.2
    commands:
      - golangci-lint run ./...

  # Functional tests against the live audiobookshelf service. The suite
  # polls the server for readiness, initializes the root user, and runs the
  # media-free slice of the API. Gated by the "integration" build tag and
  # ABS_BASE_URL so it never runs in the unit suite above.
  - name: integration
    image: golang:1.26
    environment:
      CGO_ENABLED: "0"
      ABS_BASE_URL: http://audiobookshelf:13378
    commands:
      - go test -tags=integration -count=1 .

  - name: notify-success
    image: curlimages/curl
    when:
      - status: success
    commands: |
      #!/usr/bin/env bash
      curl -s -X POST https://notify.nightcity.network/notify/apprise \
        -H "Content-Type: application/json" \
        -d '{"type":"success","tag":"automations","title":"Woodpecker CI: Audiobookshelf Workflow","body":"The project was tested and released successfully."}'

  - name: notify-failure
    image: curlimages/curl
    when:
      - status: failure
    commands: |
      #!/usr/bin/env bash
      curl -s -X POST https://notify.nightcity.network/notify/apprise \
        -H "Content-Type: application/json" \
        -d '{"type":"failure","tag":"automations","title":"Woodpecker CI: Audiobookshelf Workflow","body":"The project failed its test suite."}'
