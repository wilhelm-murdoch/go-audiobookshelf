# GitHub Actions equivalent of .woodpecker/workflow.yaml.
#
# Differences from Woodpecker that matter:
#   - Actions runs service containers with their own image entrypoint and
#     does NOT mount the repo workspace into them, so the Woodpecker
#     `cd /app && node index.js` / signal-trap workaround is unnecessary -
#     the audiobookshelf image starts cleanly on its own.
#   - The job runs on the runner host (not in a container), so the service
#     is reached via a published port on localhost rather than by name.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch: # the Woodpecker "manual" event
  schedule:
    - cron: "0 6 * * 1" # weekly; catches upstream Audiobookshelf drift

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Pinned the same way as the Makefile and Woodpecker, so all three
      # run byte-for-byte the same linter.
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...

  integration:
    runs-on: ubuntu-latest
    env:
      ABS_BASE_URL: http://localhost:13378
    services:
      audiobookshelf:
        # Pinned to the version this release is tested against; keep in
        # sync with TestedServerVersion in client.go and the README matrix.
        image: ghcr.io/advplyr/audiobookshelf:2.35.1
        env:
          PORT: "13378"
        ports:
          - 13378:13378
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The suite polls the server for readiness, initializes the root
      # user, and runs the media-free slice of the API.
      - run: go test -tags=integration -count=1 .
